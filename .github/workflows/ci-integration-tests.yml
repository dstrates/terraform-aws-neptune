name: Integration Tests
run-name: Integration Tests by @${{ github.actor }} ${{ github.sha }}

on:
  workflow_dispatch:

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for OIDC credential vending

    strategy:
      # Run test functions in parallel across matrix entries. Each entry maps
      # to a single -run pattern so tests get isolated Terraform state and can
      # be retried or cancelled independently.
      fail-fast: false
      matrix:
        test:
          - TestNeptuneServerlessCluster

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: test/go.mod
          cache-dependency-path: test/go.sum

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run ${{ matrix.test }}
        working-directory: test
        run: go test -v -run "${{ matrix.test }}$" -timeout 60m
